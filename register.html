<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Register — ShopFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;--surface:#16161e;--surface2:#1e1e2a;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);
  --accent:#6c5ce7;--accent-hover:#5a4bd1;--accent-soft:rgba(108,92,231,0.12);
  --teal:#00cba9;--teal-soft:rgba(0,203,169,0.08);
  --text:#e8e8f0;--text2:#9898b0;--text3:#5a5a70;
  --radius:10px;--radius-sm:7px;--radius-lg:14px;
  --font:'Inter',system-ui,sans-serif;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:13.5px}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;overflow:hidden;position:relative}
body::before{content:'';position:fixed;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(108,92,231,0.07) 0%,transparent 70%);top:-150px;left:-100px;pointer-events:none}
.wrap{width:100%;max-width:400px;position:relative;z-index:1;animation:fadeUp 0.4s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;justify-content:center}
.logo-icon{width:36px;height:36px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff}
.logo-name{font-size:18px;font-weight:600;letter-spacing:-0.03em}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px}
.card-head{text-align:center;margin-bottom:22px}
.card-head h1{font-size:17px;font-weight:600;letter-spacing:-0.02em;margin-bottom:6px}
.card-head p{font-size:12.5px;color:var(--text2)}
.info-box{background:var(--teal-soft);border:1px solid rgba(0,203,169,0.15);border-radius:7px;padding:10px 14px;font-size:12px;color:#5de0ca;margin-bottom:18px;display:flex;gap:8px;align-items:flex-start}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.form-label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em}
.form-input{background:var(--surface2);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:var(--font);font-size:13px;padding:9px 12px;outline:none;width:100%;transition:border-color 0.15s,box-shadow 0.15s}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,92,231,0.15)}
.form-input::placeholder{color:var(--text3)}
.btn{width:100%;padding:10px;border-radius:7px;border:none;background:var(--accent);color:#fff;font-family:var(--font);font-size:13.5px;font-weight:500;cursor:pointer;transition:background 0.15s,transform 0.1s;margin-top:4px}
.btn:hover{background:var(--accent-hover);transform:translateY(-1px)}
.footer-text{text-align:center;margin-top:18px;font-size:12px;color:var(--text3)}
.footer-text a{color:var(--accent);text-decoration:none}
.footer-text a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-icon">S</div>
    <div class="logo-name">ShopFlow</div>
  </div>

  <div class="card">
    <div class="card-head">
      <h1>Register your shop</h1>
      <p>Create an account to get started</p>
    </div>

    <div class="info-box">
      <span>ℹ</span>
      <span>Your account will be reviewed by an admin before you can log in.</span>
    </div>

    <form method="POST" action="/register">
      <div class="form-group">
        <label class="form-label">Shop Name</label>
        <input class="form-input" type="text" name="shop" placeholder="My Awesome Shop" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" name="email" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="form-group" style="margin-bottom:20px">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" name="password" placeholder="Choose a strong password" required/>
      </div>
      <button type="submit" class="btn">Create Account</button>
    </form>
  </div>

  <div class="footer-text">
    Already have an account? <a href="/">Sign in</a>
  </div>
</div>
</body>
</html>
